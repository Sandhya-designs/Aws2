<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modern CI/CD Demo</title>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:'Poppins', sans-serif;
        }

        body{
            height:100vh;
            background: linear-gradient(135deg, #0f172a, #1e3a8a, #06b6d4);
            overflow:hidden;
            color:white;
        }

        .navbar{
            width:100%;
            padding:20px 8%;
            display:flex;
            justify-content:space-between;
            align-items:center;
            position:fixed;
            top:0;
            left:0;
            z-index:1000;
            backdrop-filter: blur(10px);
            background: rgba(255,255,255,0.05);
        }

        .logo{
            font-size:28px;
            font-weight:700;
            color:#fff;
            letter-spacing:1px;
        }

        .navbar ul{
            display:flex;
            gap:25px;
            list-style:none;
        }

        .navbar ul li a{
            text-decoration:none;
            color:white;
            font-weight:500;
            transition:0.3s;
        }

        .navbar ul li a:hover{
            color:#38bdf8;
        }

        .hero{
            width:100%;
            height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
            text-align:center;
            padding:20px;
        }

        .content{
            max-width:800px;
            animation:fadeIn 2s ease;
        }

        .content h1{
            font-size:65px;
            margin-bottom:20px;
            line-height:1.2;
        }

        .content h1 span{
            color:#38bdf8;
        }

        .content p{
            font-size:20px;
            color:#e2e8f0;
            margin-bottom:35px;
            line-height:1.8;
        }

        .buttons{
            display:flex;
            justify-content:center;
            gap:20px;
            flex-wrap:wrap;
        }

        .btn{
            padding:14px 32px;
            border:none;
            border-radius:50px;
            font-size:17px;
            cursor:pointer;
            transition:0.4s;
            text-decoration:none;
            font-weight:600;
        }

        .primary-btn{
            background:#38bdf8;
            color:#0f172a;
        }

        .primary-btn:hover{
            transform:translateY(-5px);
            background:white;
        }

        .secondary-btn{
            border:2px solid white;
            color:white;
            background:transparent;
        }

        .secondary-btn:hover{
            background:white;
            color:#0f172a;
            transform:translateY(-5px);
        }

        .floating{
            position:absolute;
            border-radius:50%;
            background:rgba(255,255,255,0.1);
            animation:float 8s infinite ease-in-out;
        }

        .circle1{
            width:200px;
            height:200px;
            top:10%;
            left:5%;
        }

        .circle2{
            width:300px;
            height:300px;
            bottom:-50px;
            right:-50px;
        }

        .circle3{
            width:120px;
            height:120px;
            bottom:20%;
            left:15%;
        }

        @keyframes float{
            0%{
                transform:translateY(0px);
            }
            50%{
                transform:translateY(-25px);
            }
            100%{
                transform:translateY(0px);
            }
        }

        @keyframes fadeIn{
            from{
                opacity:0;
                transform:translateY(30px);
            }
            to{
                opacity:1;
                transform:translateY(0);
            }
        }

        @media(max-width:768px){

            .content h1{
                font-size:42px;
            }

            .content p{
                font-size:16px;
            }

            .navbar{
                flex-direction:column;
                gap:15px;
            }

            .navbar ul{
                gap:15px;
            }
        }
    </style>
</head>

<body>

    <div class="floating circle1"></div>
    <div class="floating circle2"></div>
    <div class="floating circle3"></div>

    <nav class="navbar">
        <div class="logo">DevOps Demo</div>

        <ul>
            <li><a href="#">Home</a></li>
            <li><a href="#">Projects</a></li>
            <li><a href="#">Services</a></li>
            <li><a href="#">Contact</a></li>
        </ul>
    </nav>

    <section class="hero">

        <div class="content">

            <h1>
                Welcome to <span>CI/CD Deployment</span> Demo 🚀
            </h1>

            <p>
                Build, Test, Deploy and Scale modern web applications
                with Flask, Docker, Jenkins and Cloud technologies.
            </p>

            <div class="buttons">
                <a href="#" class="btn primary-btn">
                    Get Started
                </a>

                <a href="#" class="btn secondary-btn">
                    Learn More
                </a>
            </div>

        </div>

    </section>

</body>
</html>
